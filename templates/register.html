<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertPrep - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f19;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.08);
            --bg-card: rgba(30, 41, 59, 0.4);
            --error: #f87171;
            --success: #34d399;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.03) 0%, transparent 40%);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-sizing: border-box;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .logo span.highlight {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.15);
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.88rem;
            margin-bottom: 24px;
            text-align: left;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-primary);
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.15rem;
            user-select: none;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            color: var(--accent-primary);
        }

        /* Validation border highlights */
        input.invalid {
            border-color: var(--error) !important;
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.25) !important;
        }

        input.valid {
            border-color: var(--success) !important;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.25) !important;
        }

        .validation-warning {
            font-size: 0.8rem;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">🎓 Cert<span class="highlight">Prep</span></div>
            <div class="subtitle">Create a new study account</div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Choose a password">
                        <span class="password-toggle" id="togglePassword">👁️</span>
                    </div>
                    <div class="validation-warning" id="passwordWarning">Password must be at least 6 characters.</div>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Log In</a>
            </div>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordWarning = document.getElementById('passwordWarning');
        const registerForm = document.getElementById('registerForm');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        function validatePassword() {
            const val = passwordInput.value;
            if (val.length === 0) {
                passwordInput.classList.remove('valid', 'invalid');
                passwordWarning.style.display = 'none';
                return false;
            } else if (val.length < 6) {
                passwordInput.classList.remove('valid');
                passwordInput.classList.add('invalid');
                passwordWarning.style.display = 'block';
                return false;
            } else {
                passwordInput.classList.remove('invalid');
                passwordInput.classList.add('valid');
                passwordWarning.style.display = 'none';
                return true;
            }
        }

        passwordInput.addEventListener('input', validatePassword);

        registerForm.addEventListener('submit', (e) => {
            if (!validatePassword()) {
                e.preventDefault();
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
